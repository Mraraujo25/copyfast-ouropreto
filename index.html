<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copyfast Ouro Preto</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:black; color:white; text-align:center; padding:20px; }
.container { max-width:600px; margin:40px auto; background:white; padding:30px; border-radius:10px; }
input, textarea, select {
    width:100%; padding:12px; margin-top:10px;
    border-radius:8px; border:1px solid #ccc;
}
button {
    width:100%; padding:15px; margin-top:20px;
    background:black; color:white; border:none; border-radius:8px;
}
.price { text-align:center; margin-top:15px; font-size:20px; font-weight:bold; }
.loading { text-align:center; display:none; }
</style>
</head>

<body>

<header>
<h1>Copyfast Ouro Preto</h1>
<p>Envie seus arquivos para impressão</p>
</header>

<div class="container">

<input type="text" id="nome" placeholder="Seu nome">

<select id="tipo">
<option value="pb">Preto e Branco</option>
<option value="colorido">Colorido</option>
</select>

<input type="number" id="paginas" value="1" min="1">

<textarea id="instrucao" placeholder="Instruções"></textarea>

<input type="file" id="arquivo">

<div class="price">Total: R$ <span id="total">0.00</span></div>

<button onclick="enviar()">Enviar Pedido</button>

<div class="loading" id="loading">Enviando arquivo...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKGMEnwbW6UzJv2zwWFBEZN3xvXf1yejM",
  authDomain: "copyfast-4c42b.firebaseapp.com",
  projectId: "copyfast-4c42b",
  storageBucket: "copyfast-4c42b.firebasestorage.app",
  messagingSenderId: "1083745936240",
  appId: "1:1083745936240:web:d5c83f5c89033d7060a5b5"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

const precoPB = 0.20;
const precoColorido = 1.00;

function calcular() {
    let tipo = document.getElementById("tipo").value;
    let paginas = document.getElementById("paginas").value;

    let total = tipo === "pb"
        ? paginas * precoPB
        : paginas * precoColorido;

    document.getElementById("total").innerText = total.toFixed(2);
}

document.getElementById("tipo").onchange = calcular;
document.getElementById("paginas").oninput = calcular;

calcular();

window.enviar = async function () {

    let nome = document.getElementById("nome").value;
    let tipo = document.getElementById("tipo").value;
    let paginas = document.getElementById("paginas").value;
    let instrucao = document.getElementById("instrucao").value;
    let file = document.getElementById("arquivo").files[0];
    let total = document.getElementById("total").innerText;

    if (!file) {
        alert("Selecione um arquivo!");
        return;
    }

    document.getElementById("loading").style.display = "block";

    try {
        const storageRef = ref(storage, 'uploads/' + Date.now() + "_" + file.name);

        await uploadBytes(storageRef, file);

        let url = await getDownloadURL(storageRef);
        url = url + "&alt=media";

        // 🔥 SALVAR NO BANCO (AGORA SEM TRAVAR)
        await addDoc(collection(db, "pedidos"), {
            nome,
            tipo,
            paginas,
            instrucao,
            total,
            arquivo: url,
            data: new Date()
        });

        let mensagem = `Pedido:%0A
Nome: ${nome}%0A
Tipo: ${tipo}%0A
Páginas: ${paginas}%0A
Total: R$ ${total}%0A
Arquivo: ${url}`;

        window.location.href = `https://wa.me/5531989628676?text=${encodeURIComponent(mensagem)}`;

    } catch (erro) {
        alert("Erro: " + erro);
        console.error(erro);
    }

    document.getElementById("loading").style.display = "none";
}
</script>

</body>
</html>
