<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copyfast Ouro Preto</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    header {
      background: #000;
      color: #fff;
      text-align: center;
      padding: 28px 16px;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    header p {
      margin: 0;
      opacity: 0.9;
    }

    .container {
      max-width: 680px;
      margin: 32px auto;
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      margin-top: 16px;
      font-weight: bold;
    }

    input, select, textarea, button {
      width: 100%;
      margin-top: 8px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #d7d7d7;
      font-size: 15px;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      background: #000;
      color: #fff;
      border: none;
      cursor: pointer;
      margin-top: 24px;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.92;
    }

    .price-box, .pix-box, .status-box {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #f1f1f1;
    }

    .price-box {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .pix-box {
      display: none;
      word-break: break-word;
    }

    .pix-box h3 {
      margin-top: 0;
    }

    .status-box {
      display: none;
      text-align: center;
      font-weight: bold;
    }

    .small {
      font-size: 13px;
      color: #555;
      margin-top: 8px;
    }

    .copy-btn {
      margin-top: 12px;
      background: #222;
    }

    img.qr {
      width: 220px;
      max-width: 100%;
      display: block;
      margin: 16px auto 0;
      border-radius: 8px;
      background: #fff;
      padding: 8px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Copyfast Ouro Preto</h1>
    <p>Envie seu arquivo, calcule o valor e gere o PIX automaticamente</p>
  </header>

  <div class="container">
    <label for="nome">Seu nome</label>
    <input type="text" id="nome" placeholder="Digite seu nome">

    <label for="tipo">Tipo de impressão</label>
    <select id="tipo">
      <option value="pb">Preto e branco</option>
      <option value="colorido">Colorido</option>
    </select>

    <label for="paginas">Número de páginas</label>
    <input type="number" id="paginas" min="1" value="1">

    <label for="instrucao">Instruções</label>
    <textarea id="instrucao" placeholder="Ex: frente e verso, grampear, entregar amanhã..."></textarea>

    <label for="arquivo">Arquivo</label>
    <input type="file" id="arquivo">

    <div class="price-box">
      Total: R$ <span id="total">0.00</span>
    </div>

    <button onclick="enviar()">Enviar pedido</button>

    <div class="status-box" id="statusBox">Enviando arquivo e gerando PIX...</div>

    <div class="pix-box" id="pixBox">
      <h3>PIX gerado com sucesso</h3>
      <p><strong>Copia e cola:</strong></p>
      <div id="pixCode"></div>
      <button class="copy-btn" onclick="copiarPix()">Copiar código PIX</button>
      <div id="qrArea"></div>
      <button class="copy-btn" id="btnPago" onclick="verificarPagamento()">Já paguei</button>
      <p class="small" id="pixStatusMsg">Pague o PIX e depois clique em "Já paguei".</p>
    </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCKGMEnwbW6UzJv2zwWFBEZN3xvXf1yejM",
      authDomain: "copyfast-4c42b.firebaseapp.com",
      projectId: "copyfast-4c42b",
      storageBucket: "copyfast-4c42b.firebasestorage.app",
      messagingSenderId: "1083745936240",
      appId: "1:1083745936240:web:d5c83f5c89033d7060a5b5"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);

    const precoPB = 0.20;
    const precoColorido = 1.00;

    let ultimoPaymentId = null;
    let ultimaMensagemWhatsapp = "";

    function calcular() {
      const tipo = document.getElementById("tipo").value;
      const paginas = parseInt(document.getElementById("paginas").value) || 0;

      const total = tipo === "pb"
        ? paginas * precoPB
        : paginas * precoColorido;

      document.getElementById("total").innerText = total.toFixed(2);
    }

    document.getElementById("tipo").addEventListener("change", calcular);
    document.getElementById("paginas").addEventListener("input", calcular);
    calcular();

    window.copiarPix = async function () {
      const texto = document.getElementById("pixCode").innerText;
      try {
        await navigator.clipboard.writeText(texto);
        alert("Código PIX copiado!");
      } catch {
        alert("Não consegui copiar automaticamente. Copie manualmente.");
      }
    };

    window.enviar = async function () {
      const nome = document.getElementById("nome").value.trim();
      const tipo = document.getElementById("tipo").value;
      const paginas = document.getElementById("paginas").value;
      const instrucao = document.getElementById("instrucao").value.trim();
      const file = document.getElementById("arquivo").files[0];
      const total = document.getElementById("total").innerText;

      const statusBox = document.getElementById("statusBox");
      const pixBox = document.getElementById("pixBox");
      const pixCode = document.getElementById("pixCode");
      const qrArea = document.getElementById("qrArea");

      if (!nome) {
        alert("Digite seu nome.");
        return;
      }

      if (!file) {
        alert("Selecione um arquivo.");
        return;
      }

      statusBox.style.display = "block";
      pixBox.style.display = "none";
      pixCode.innerText = "";
      qrArea.innerHTML = "";

      try {
        const storageRef = ref(storage, "uploads/" + Date.now() + "_" + file.name);
        await uploadBytes(storageRef, file);

        let url = await getDownloadURL(storageRef);
        url = url + "&alt=media";

        const respostaPix = await fetch("https://us-central1-copyfast-4c42b.cloudfunctions.net/criarPix", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            nome: nome,
            tipo: tipo,
            paginas: Number(paginas),
            total: Number(total),
            descricao: `Impressão ${tipo} - ${paginas} páginas`,
            arquivo: url
          })
        });

        const pix = await respostaPix.json();

        if (!respostaPix.ok) {
          throw new Error(pix.error || "Falha ao gerar PIX");
        }

        statusBox.style.display = "none";
        pixBox.style.display = "block";
        pixCode.innerText = pix.qr_code || "Código PIX não retornado.";

        if (pix.qr_code_base64) {
          qrArea.innerHTML = `<img class="qr" src="data:image/png;base64,${pix.qr_code_base64}" alt="QR Code PIX">`;
        }

        const mensagem = `Olá! Pedido de impressão:
        Nome: ${nome}
        Tipo: ${tipo}
        Páginas: ${paginas}
        Total: R$ ${total}
        Instruções: ${instrucao || "Nenhuma"}
        Arquivo: ${url}`;

        ultimoPaymentId = pix.id;
        ultimaMensagemWhatsapp = mensagem;

        document.getElementById("pixStatusMsg").innerText = 'Pague o PIX e depois clique em "Já paguei".';

      } catch (erro) {
        statusBox.style.display = "none";
        alert("Erro: " + erro.message);
        console.error(erro);
      }
    };
    window.verificarPagamento = async function () {
  if (!ultimoPaymentId) {
    alert("Nenhum pagamento encontrado.");
    return;
  }

  const msg = document.getElementById("pixStatusMsg");
  msg.innerText = "Verificando pagamento...";

  try {
    const resposta = await fetch("https://us-central1-copyfast-4c42b.cloudfunctions.net/verificarPagamentoPix", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        paymentId: ultimoPaymentId
      })
    });

    const dados = await resposta.json();

    if (!resposta.ok) {
      throw new Error(dados.error || "Erro ao verificar pagamento");
    }

    if (dados.status === "approved") {
      msg.innerText = "Pagamento confirmado! Abrindo WhatsApp...";
      window.location.href = `https://wa.me/5531989628676?text=${encodeURIComponent(ultimaMensagemWhatsapp)}`;
    } else {
      msg.innerText = "Pagamento ainda não foi confirmado. Aguarde alguns segundos e tente novamente.";
    }
  } catch (erro) {
    msg.innerText = "Erro ao verificar pagamento.";
    alert("Erro: " + erro.message);
  }
};

</script>

</body>
</html>
