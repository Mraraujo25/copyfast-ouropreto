<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Copyfast</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
}

input, button {
    width:100%;
    padding:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>Login Admin</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKGMEnwbW6UzJv2zwWFBEZN3xvXf1yejM",
  authDomain: "copyfast-4c42b.firebaseapp.com",
  projectId: "copyfast-4c42b",
  storageBucket: "copyfast-4c42b.firebasestorage.app",
  messagingSenderId: "1083745936240",
  appId: "1:1083745936240:web:d5c83f5c89033d7060a5b5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
    let email = document.getElementById("email").value;
    let senha = document.getElementById("senha").value;

    signInWithEmailAndPassword(auth, email, senha)
    .then(() => {
        window.location.href = "admin.html";
    })
    .catch(() => {
        alert("Login inválido");
    });
}
</script>

</body>
</html>
